* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--ground);
  color: var(--fg);
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.layout { display: flex; height: 100vh; position: relative; }

.panel {
  position: absolute;
  left: 16px;
  top: 16px;
  bottom: 16px;
  width: 288px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 10;
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar) transparent;
}

.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

.panel-header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-header h1 {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--fg);
  margin-bottom: 2px;
}

.panel-header .subtitle {
  font-size: 11.5px;
  color: var(--muted);
  letter-spacing: 0.01em;
}

.panel-body { padding: 0; flex: 1; }

.section {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.section:last-child { border-bottom: none; }

.section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 10px;
}

.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}

.stat-card {
  background: var(--stat-bg);
  border-radius: 8px;
  padding: 10px 8px 8px;
  text-align: center;
}

.stat-val {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  line-height: 1;
}

.stat-unit {
  font-size: 9.5px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.03em;
}

.search-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--stat-bg);
  color: var(--fg);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.rank-list { list-style: none; }

.rank-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 11.5px;
  cursor: pointer;
  transition: opacity 0.1s;
}

.rank-item:hover { opacity: 0.7; }

.rank-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.rank-name {
  flex: 1;
  color: var(--fg-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rank-val {
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-size: 10.5px;
  flex-shrink: 0;
}

.comm-list { display: flex; flex-direction: column; gap: 1px; }

.comm-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 11.5px;
}

.comm-row:hover { background: var(--stat-bg); }
.comm-row.active { background: var(--accent-dim); }

.comm-pip {
  width: 8px;
  height: 8px;
  border-radius: 3px;
  flex-shrink: 0;
}

.comm-label {
  flex: 1;
  color: var(--fg-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.comm-ct {
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-size: 10px;
  flex-shrink: 0;
}

.detail-card {
  background: var(--stat-bg);
  border-radius: 8px;
  padding: 12px;
  display: none;
}

.detail-card.show { display: block; }

.detail-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
  margin-bottom: 8px;
  word-break: break-word;
}

.detail-row {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 3px;
  display: flex;
  gap: 4px;
}

.detail-row .dlabel {
  color: var(--muted);
  flex-shrink: 0;
}

.detail-row .dval {
  color: var(--fg-soft);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 10.5px;
  word-break: break-all;
}

.detail-metrics {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.detail-metric {
  text-align: center;
}

.detail-metric .dm-val {
  font-size: 14px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}

.detail-metric .dm-label {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.canvas-wrap {
  flex: 1;
  position: relative;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.zoom-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.zbtn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--fg-soft);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
  box-shadow: var(--shadow);
  line-height: 1;
}

.zbtn:hover { background: var(--accent-dim); color: var(--accent); }
.zbtn-reset { font-size: 12px; font-weight: 600; }

.hint {
  position: absolute;
  bottom: 20px;
  left: 324px;
  font-size: 10.5px;
  color: var(--muted);
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  pointer-events: none;
  opacity: 0.8;
}

@media (max-width: 640px) {
  .panel { width: 240px; left: 8px; top: 8px; bottom: 8px; }
  .hint { left: 256px; }
}

<script>
(function() {
'use strict';

const DATA = JSON.parse(document.getElementById('graphData').textContent);
const NODES = DATA.nodes;
const EDGES = DATA.edges;
const COMMS = DATA.comms;

// --- Stats ---
const statsEl = document.getElementById('stats');
statsEl.innerHTML = [
  ['Nodes', NODES.length],
  ['Edges', EDGES.length],
  ['Clusters', COMMS.length],
].map(([u, v]) => `<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-unit">${u}</div></div>`).join('');

// --- Canvas setup ---
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(devicePixelRatio, 2);
  const r = cv.parentElement.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); });

// --- Init positions (community-aware) ---
const nodeMap = {};
const commCenters = {};
const commIds = [...new Set(NODES.map(n => n.g))];
commIds.forEach((cid, i) => {
  const angle = (i / commIds.length) * Math.PI * 2 - Math.PI / 2;
  const r = Math.min(W, H) * 0.28;
  commCenters[cid] = { x: W / 2 + Math.cos(angle) * r, y: H / 2 + Math.sin(angle) * r };
});

for (const n of NODES) {
  const cc = commCenters[n.g] || { x: W / 2, y: H / 2 };
  n.x = cc.x + (Math.random() - 0.5) * 80;
  n.y = cc.y + (Math.random() - 0.5) * 80;
  n.vx = 0; n.vy = 0;
  n._vis = true;
  nodeMap[n.id] = n;
}

// Edge adjacency
const adj = {};
for (const n of NODES) adj[n.id] = [];
for (const e of EDGES) {
  if (nodeMap[e.f] && nodeMap[e.t]) {
    adj[e.f].push(e.t);
    adj[e.t].push(e.f);
  }
}

// --- Simulation ---
let zoom = 1, panX = 0, panY = 0;
let simTick = 0;
const MAX_TICKS = 280;

function simulate() {
  if (simTick >= MAX_TICKS) return;
  simTick++;
  const alpha = Math.max(0.001, 1 - simTick / MAX_TICKS) * 0.25;
  const rep = 600, att = 0.004, center = 0.0008;

  for (let i = 0; i < NODES.length; i++) {
    const a = NODES[i];
    for (let j = i + 1; j < NODES.length; j++) {
      const b = NODES[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 1) d2 = 1;
      if (d2 > 160000) continue;
      const f = rep / d2 * alpha;
      a.vx += dx * f; a.vy += dy * f;
      b.vx -= dx * f; b.vy -= dy * f;
    }
  }

  for (const e of EDGES) {
    const a = nodeMap[e.f], b = nodeMap[e.t];
    if (!a || !b) continue;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) continue;
    const f = d * att * alpha;
    a.vx += dx / d * f; a.vy += dy / d * f;
    b.vx -= dx / d * f; b.vy -= dy / d * f;
  }

  for (const n of NODES) {
    n.vx += (W / 2 - n.x) * center * alpha;
    n.vy += (H / 2 - n.y) * center * alpha;
    n.vx *= 0.55; n.vy *= 0.55;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(30, Math.min(W - 30, n.x));
    n.y = Math.max(30, Math.min(H - 30, n.y));
  }
}

// --- Drawing ---
let selected = null;
let highlightComm = null;
let searchTerm = '';

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // Dot grid background
  const dotStep = 24;
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--canvas-dot').trim();
  for (let gx = dotStep; gx < W; gx += dotStep) {
    for (let gy = dotStep; gy < H; gy += dotStep) {
      ctx.fillRect(gx, gy, 1, 1);
    }
  }

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  const edgeBase = getComputedStyle(document.documentElement).getPropertyValue('--edge-color').trim();
  const edgeHi = getComputedStyle(document.documentElement).getPropertyValue('--edge-hi').trim();
  const fgColor = getComputedStyle(document.documentElement).getPropertyValue('--fg').trim();

  const filtering = highlightComm !== null || searchTerm;

  // Edges
  ctx.lineWidth = 0.5 / Math.max(zoom, 0.5);
  for (const e of EDGES) {
    const a = nodeMap[e.f], b = nodeMap[e.t];
    if (!a || !b) continue;
    const aVis = !filtering || a._vis;
    const bVis = !filtering || b._vis;
    if (!aVis && !bVis) continue;
    ctx.globalAlpha = (aVis && bVis) ? 1 : 0.15;
    ctx.strokeStyle = edgeBase;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // Highlighted edges for selected node
  if (selected) {
    ctx.strokeStyle = selected.c;
    ctx.lineWidth = 1.5 / Math.max(zoom, 0.5);
    ctx.globalAlpha = 0.4;
    for (const nbId of (adj[selected.id] || [])) {
      const nb = nodeMap[nbId];
      if (!nb) continue;
      ctx.beginPath();
      ctx.moveTo(selected.x, selected.y);
      ctx.lineTo(nb.x, nb.y);
      ctx.stroke();
    }
  }

  // Nodes
  for (const n of NODES) {
    const vis = !filtering || n._vis;
    ctx.globalAlpha = vis ? 0.88 : 0.06;
    ctx.fillStyle = n.c;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.s, 0, Math.PI * 2);
    ctx.fill();

    if (vis && n.s > 7 && zoom > 0.4) {
      ctx.globalAlpha = vis ? 0.78 : 0.04;
      ctx.fillStyle = fgColor;
      const fs = Math.max(7, Math.min(11, n.s * 0.7));
      ctx.font = `500 ${fs}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const lbl = n.l.length > 22 ? n.l.slice(0, 20) + '…' : n.l;
      ctx.fillText(lbl, n.x, n.y + n.s + 4);
    }
  }

  // Selection ring
  if (selected) {
    ctx.globalAlpha = 1;
    ctx.strokeStyle = selected.c;
    ctx.lineWidth = 2 / Math.max(zoom, 0.3);
    ctx.beginPath();
    ctx.arc(selected.x, selected.y, selected.s + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1 / Math.max(zoom, 0.3);
    ctx.beginPath();
    ctx.arc(selected.x, selected.y, selected.s + 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}
loop();

// --- Sidebar: PageRank list ---
function buildRankList(containerId, items, valKey, fmt) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(it =>
    `<li class="rank-item" data-label="${it.l}">` +
    `<span class="rank-dot" style="background:${it.c}"></span>` +
    `<span class="rank-name">${it.l}</span>` +
    `<span class="rank-val">${fmt(it[valKey])}</span></li>`
  ).join('');
  el.querySelectorAll('.rank-item').forEach(li => {
    li.addEventListener('click', () => {
      const label = li.dataset.label;
      const node = NODES.find(n => n.l === label);
      if (node) selectNode(node);
    });
  });
}
buildRankList('prList', DATA.topPR, 'pr', v => v.toFixed(4));
buildRankList('brList', DATA.topBr, 'b', v => v);

// --- Sidebar: Communities ---
const commListEl = document.getElementById('commList');
COMMS.forEach(c => {
  const row = document.createElement('div');
  row.className = 'comm-row';
  row.innerHTML = `<span class="comm-pip" style="background:${c.cl}"></span><span class="comm-label">${c.n}</span><span class="comm-ct">${c.c}</span>`;
  row.addEventListener('click', () => {
    if (highlightComm === c.id) {
      highlightComm = null;
      row.classList.remove('active');
    } else {
      highlightComm = c.id;
      commListEl.querySelectorAll('.comm-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
    }
    updateVisibility();
  });
  commListEl.appendChild(row);
});

// --- Search ---
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  updateVisibility();
});

function updateVisibility() {
  for (const n of NODES) {
    let vis = true;
    if (highlightComm !== null && n.g !== highlightComm) vis = false;
    if (searchTerm && !n.l.toLowerCase().includes(searchTerm) && !n.f.toLowerCase().includes(searchTerm) && !n.cn.toLowerCase().includes(searchTerm)) vis = false;
    n._vis = vis;
  }
}

// --- Node selection ---
function selectNode(node) {
  selected = node;
  const sec = document.getElementById('detailSection');
  const det = document.getElementById('detail');
  sec.style.display = 'block';
  det.innerHTML =
    `<div class="detail-title">${node.l}</div>` +
    (node.f ? `<div class="detail-row"><span class="dlabel">File</span><span class="dval">${node.f}</span></div>` : '') +
    `<div class="detail-row"><span class="dlabel">Type</span><span class="dval">${node.t}</span></div>` +
    `<div class="detail-row"><span class="dlabel">Community</span><span class="dval">${node.cn}</span></div>` +
    `<div class="detail-metrics">` +
    `<div class="detail-metric"><div class="dm-val">${node.pr.toFixed(4)}</div><div class="dm-label">PageRank</div></div>` +
    `<div class="detail-metric"><div class="dm-val">${node.d}</div><div class="dm-label">Degree</div></div>` +
    `<div class="detail-metric"><div class="dm-val">${node.b}</div><div class="dm-label">Bridge</div></div>` +
    `</div>`;
}

// --- Canvas interaction ---
cv.addEventListener('click', e => {
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX - rect.left - panX) / zoom;
  const my = (e.clientY - rect.top - panY) / zoom;
  let closest = null, closestD = Infinity;
  for (const n of NODES) {
    const dx = n.x - mx, dy = n.y - my;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < n.s + 6 && d < closestD) { closest = n; closestD = d; }
  }
  if (closest) {
    selectNode(closest);
  } else {
    selected = null;
    document.getElementById('detailSection').style.display = 'none';
  }
});

let dragging = false, dragX, dragY;
cv.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; dragY = e.clientY; cv.style.cursor = 'grabbing'; });
cv.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - dragX; panY += e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; cv.style.cursor = 'default'; });
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const dz = e.deltaY > 0 ? 0.88 : 1.12;
  const nz = Math.max(0.08, Math.min(6, zoom * dz));
  panX = mx - (mx - panX) * (nz / zoom);
  panY = my - (my - panY) * (nz / zoom);
  zoom = nz;
}, { passive: false });

document.getElementById('zi').addEventListener('click', () => { zoom = Math.min(6, zoom * 1.4); });
document.getElementById('zo').addEventListener('click', () => { zoom = Math.max(0.08, zoom * 0.7); });
document.getElementById('zr').addEventListener('click', () => { zoom = 1; panX = 0; panY = 0; });

})();
</script>

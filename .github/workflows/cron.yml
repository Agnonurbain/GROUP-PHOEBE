name: Cron Jobs

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '0 */2 * * 1-5'
    - cron: '0 */4 * * *'
    - cron: '*/30 * * * *'

jobs:
  identify:
    runs-on: ubuntu-latest
    outputs:
      path: ${{ steps.route.outputs.path }}
    steps:
      - name: Identify route
        id: route
        run: |
          case "${{ github.event.schedule }}" in
            "*/15 * * * *")     echo "path=api/cron/expiration" >> $GITHUB_OUTPUT;;
            "0 */2 * * 1-5")   echo "path=api/cron/expirer-demandes-sans-reponse" >> $GITHUB_OUTPUT;;
            "0 */4 * * *")     echo "path=api/cron/expirer-non-presentations" >> $GITHUB_OUTPUT;;
            "*/30 * * * *")    echo "path=api/cron/expirer-negociations" >> $GITHUB_OUTPUT;;
          esac

  call:
    needs: identify
    runs-on: ubuntu-latest
    steps:
      - name: Invoke cron endpoint
        env:
          # group-phoebe.com n'a jamais existe (NXDOMAIN) : aucun domaine
          # personnalise n'est attache au projet Vercel. Definir la variable
          # de depot CRON_BASE_URL le jour ou un domaine sera configure.
          BASE_URL: ${{ vars.CRON_BASE_URL || 'https://group-phoebe-web.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PATH_SEGMENT: ${{ needs.identify.outputs.path }}
        run: |
          set -euo pipefail

          if [ -z "$PATH_SEGMENT" ]; then
            echo "::error::Aucune route associee au schedule '${{ github.event.schedule }}'."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Secret CRON_SECRET absent du depot. La meme valeur"
            echo "doit etre definie dans les variables d'environnement Vercel."
            exit 1
          fi

          # Volontairement SANS repli silencieux : ces routes liberent les
          # vehicules et expirent les reservations abandonnees. Un echec
          # masque laisserait des vehicules bloques sans que personne ne le
          # sache. L'echec doit rester visible.
          echo "Appel de $BASE_URL/$PATH_SEGMENT"
          curl --fail --silent --show-error --max-time 60 \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/$PATH_SEGMENT"
